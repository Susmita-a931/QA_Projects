name: ShopEase QA

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'projects/web/shopease/**'

jobs:
  playwright:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: projects/web/shopease

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Playwright tests
        run: pnpm test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: shopease-playwright-report
          path: projects/web/shopease/evidence/reports/playwright-html

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: shopease-test-results
          path: projects/web/shopease/test-results
